name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx astro sync
      - run: npm run lint
      - name: Run unit tests
        run: npm run test:unit
      - run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx astro sync
      - uses: supabase/setup-cli@v3
      - run: supabase db start
      - name: Export local Supabase env vars
        run: |
          SUPABASE_ENV=$(supabase status -o env 2>&1)
          echo "Available keys: $(echo "$SUPABASE_ENV" | grep -o '^[^=]*' | tr '\n' ' ')"
          echo "$SUPABASE_ENV" | grep -E '^(API_URL|SUPABASE_URL)=' \
            | head -1 | sed 's/^[^=]*=/TEST_SUPABASE_URL=/' >> "$GITHUB_ENV"
          echo "$SUPABASE_ENV" | grep -E '^(ANON_KEY|SUPABASE_ANON_KEY)=' \
            | head -1 | sed 's/^[^=]*=/TEST_SUPABASE_ANON_KEY=/' >> "$GITHUB_ENV"
          echo "$SUPABASE_ENV" | grep -E '^(SERVICE_ROLE_KEY|SUPABASE_SERVICE_ROLE_KEY)=' \
            | head -1 | sed 's/^[^=]*=/TEST_SUPABASE_SERVICE_ROLE_KEY=/' >> "$GITHUB_ENV"
          echo "Exported keys: $(grep -o '^TEST_SUPABASE_[^=]*' "$GITHUB_ENV" | tr '\n' ' ')"
      - run: npm run test:integration

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [ci, integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
