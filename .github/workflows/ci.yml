name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx astro sync
      - run: npm run lint
      - name: Run unit tests
        run: npm run test:unit
      - run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx astro sync
      - uses: supabase/setup-cli@v3
      - run: supabase start
      - name: Export local Supabase env vars
        run: |
          supabase status -o env > /tmp/supa.env
          extract() { grep "^$1=" /tmp/supa.env | head -1 | sed -e "s/^$1=//" -e 's/^"//' -e 's/"$//'; }
          echo "TEST_SUPABASE_URL=$(extract API_URL)" >> "$GITHUB_ENV"
          echo "TEST_SUPABASE_ANON_KEY=$(extract ANON_KEY)" >> "$GITHUB_ENV"
          echo "TEST_SUPABASE_SERVICE_ROLE_KEY=$(extract SERVICE_ROLE_KEY)" >> "$GITHUB_ENV"
      - run: npm run test:integration

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [ci, integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
